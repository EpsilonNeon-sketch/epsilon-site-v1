<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epsilon Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" href="epsilon logo.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #f3e8ff;
        }

        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: radial-gradient(at 0% 0%, #1e1b4b 0, transparent 50%), radial-gradient(at 100% 100%, #312e81 0, transparent 50%);
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center py-12 px-6">
    <div class="bg-mesh"></div>

    <!-- Login Page -->
    <div id="loginPage" class="page active max-w-md w-full">
        <div class="glass p-8 rounded-3xl">
            <h1 class="text-3xl font-bold mb-6 text-center">EPSILON<span class="text-purple-600"> ADMIN</span></h1>
            <form id="loginForm" class="space-y-4">
                <input id="adminEmail" type="email" placeholder="Admin Email"
                    class="w-full rounded-lg px-4 py-3 bg-gray-800 border border-purple-700 focus:outline-none focus:ring-2 focus:ring-purple-600"
                    required>
                <input id="adminPassword" type="password" placeholder="Password"
                    class="w-full rounded-lg px-4 py-3 bg-gray-800 border border-purple-700 focus:outline-none focus:ring-2 focus:ring-purple-600"
                    required>
                <button type="submit"
                    class="w-full bg-purple-700 hover:bg-purple-800 text-white py-3 rounded-lg font-bold">Login</button>
                <p id="loginError" class="text-red-500 text-sm hidden"></p>
            </form>
        </div>
    </div>

    <!-- Dashboard Page -->
    <div id="dashboardPage" class="page max-w-7xl w-full">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold">Admin Dashboard</h1>
            <button id="logoutBtn" class="glass px-4 py-2 rounded-lg hover:bg-purple-600">Logout</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <button class="nav-btn glass p-6 rounded-3xl hover:bg-purple-600 transition" data-page="chat">
                <i data-lucide="message-circle" class="w-8 h-8 mx-auto mb-2"></i>
                <p class="font-bold">Admin Chat</p>
            </button>
            <button class="nav-btn glass p-6 rounded-3xl hover:bg-purple-600 transition" data-page="projects">
                <i data-lucide="folder" class="w-8 h-8 mx-auto mb-2"></i>
                <p class="font-bold">Projects</p>
            </button>
            <button class="nav-btn glass p-6 rounded-3xl hover:bg-purple-600 transition" data-page="users">
                <i data-lucide="users" class="w-8 h-8 mx-auto mb-2"></i>
                <p class="font-bold">Manage Users</p>
            </button>
            <button class="nav-btn glass p-6 rounded-3xl hover:bg-purple-600 transition" data-page="analytics">
                <i data-lucide="bar-chart" class="w-8 h-8 mx-auto mb-2"></i>
                <p class="font-bold">Analytics</p>
            </button>
            <button class="nav-btn glass p-6 rounded-3xl hover:bg-purple-600 transition" data-page="charts">
                <i data-lucide="pie-chart" class="w-8 h-8 mx-auto mb-2"></i>
                <p class="font-bold">Charts</p>
            </button>
            <button class="nav-btn glass p-6 rounded-3xl hover:bg-purple-600 transition" data-page="servers">
                <i data-lucide="shield-off" class="w-8 h-8 mx-auto mb-2"></i>
                <p class="font-bold">Block Servers</p>
            </button>
        </div>

        <!-- Chat Section -->
        <div id="chatSection" class="section hidden">
            <div class="glass p-6 rounded-3xl">
                <h2 class="text-2xl font-bold mb-4">Admin Chat Room</h2>
                <div id="chatMessages" class="h-96 overflow-y-auto mb-4 space-y-3"></div>
                <form id="chatForm" class="flex gap-2">
                    <input id="chatInput" type="text" placeholder="Type a message..."
                        class="flex-1 rounded-lg px-4 py-3 bg-gray-800 border border-purple-700" required>
                    <button type="submit"
                        class="bg-purple-700 hover:bg-purple-800 text-white px-6 py-3 rounded-lg">Send</button>
                </form>
            </div>
        </div>

        <!-- Projects Section -->
        <div id="projectsSection" class="section hidden">
            <div class="glass p-6 rounded-3xl mb-6">
                <h2 class="text-2xl font-bold mb-4">Create Project</h2>
                <form id="projectForm" class="space-y-4">
                    <input id="projectName" type="text" placeholder="Project Name"
                        class="w-full rounded-lg px-4 py-3 bg-gray-800 border border-purple-700" required>
                    <textarea id="projectDesc" placeholder="Description"
                        class="w-full rounded-lg px-4 py-3 bg-gray-800 border border-purple-700" rows="3"
                        required></textarea>
                    <select id="projectStatus" class="w-full rounded-lg px-4 py-3 bg-gray-800 border border-purple-700">
                        <option value="planning">Planning</option>
                        <option value="in-progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                    <button type="submit"
                        class="bg-purple-700 hover:bg-purple-800 text-white px-6 py-3 rounded-lg">Create
                        Project</button>
                </form>
            </div>
            <div id="projectsList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <!-- Users Section -->
        <div id="usersSection" class="section hidden">
            <div class="glass p-6 rounded-3xl">
                <h2 class="text-2xl font-bold mb-4">User Management</h2>
                <div id="usersList" class="space-y-3"></div>
            </div>
        </div>

        <!-- Analytics Section -->
        <div id="analyticsSection" class="section hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-lg font-bold mb-2">Total Users</h3>
                    <p id="totalUsers" class="text-4xl font-bold text-purple-400">0</p>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-lg font-bold mb-2">Total Posts</h3>
                    <p id="totalPosts" class="text-4xl font-bold text-purple-400">0</p>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-lg font-bold mb-2">Active Projects</h3>
                    <p id="activeProjects" class="text-4xl font-bold text-purple-400">0</p>
                </div>
            </div>
        </div>

        <!-- Server Blocking Section -->
        <div id="serversSection" class="section hidden">
            <div class="glass p-6 rounded-3xl mb-6">
                <h2 class="text-2xl font-bold mb-4">Block Epsilon Sites</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <button onclick="blockAllSites()"
                        class="site-block-btn glass p-4 rounded-lg hover:bg-red-600 transition">
                        <p class="font-bold">Toggle All</p>
                    </button>
                    <button onclick="toggleSiteBlock('aproxi')"
                        class="site-block-btn glass p-4 rounded-lg hover:bg-red-600 transition" data-site="aproxi">
                        <p class="font-bold">Aproxi</p>
                        <p class="text-xs text-purple-400 mt-1" id="status-aproxi">Active</p>
                    </button>
                    <button onclick="toggleSiteBlock('neote')"
                        class="site-block-btn glass p-4 rounded-lg hover:bg-red-600 transition" data-site="neote">
                        <p class="font-bold">Neote</p>
                        <p class="text-xs text-purple-400 mt-1" id="status-neote">Active</p>
                    </button>
                    <button onclick="toggleSiteBlock('edits')"
                        class="site-block-btn glass p-4 rounded-lg hover:bg-red-600 transition" data-site="edits">
                        <p class="font-bold">Edits</p>
                        <p class="text-xs text-purple-400 mt-1" id="status-edits">Active</p>
                    </button>
                    <button onclick="toggleSiteBlock('academics')"
                        class="site-block-btn glass p-4 rounded-lg hover:bg-red-600 transition" data-site="academics">
                        <p class="font-bold">Academics</p>
                        <p class="text-xs text-purple-400 mt-1" id="status-academics">Active</p>
                    </button>
                    <button onclick="toggleSiteBlock('sports')"
                        class="site-block-btn glass p-4 rounded-lg hover:bg-red-600 transition" data-site="sports">
                        <p class="font-bold">Sports</p>
                        <p class="text-xs text-purple-400 mt-1" id="status-sports">Active</p>
                    </button>
                    <button onclick="toggleSiteBlock('earth')"
                        class="site-block-btn glass p-4 rounded-lg hover:bg-red-600 transition" data-site="earth">
                        <p class="font-bold">Earth</p>
                        <p class="text-xs text-purple-400 mt-1" id="status-earth">Active</p>
                    </button>
                    <button onclick="toggleSiteBlock('heckle')"
                        class="site-block-btn glass p-4 rounded-lg hover:bg-red-600 transition" data-site="heckle">
                        <p class="font-bold">Heckle</p>
                        <p class="text-xs text-purple-400 mt-1" id="status-heckle">Active</p>
                    </button>
                </div>
            </div>
        </div>

        <!-- Charts Section -->
        <div id="chartsSection" class="section hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-lg font-bold mb-4">User Growth (Last 7 Days)</h3>
                    <canvas id="userGrowthChart"></canvas>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-lg font-bold mb-4">Project Status Distribution</h3>
                    <canvas id="projectStatusChart"></canvas>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-lg font-bold mb-4">Posts Activity (Last 7 Days)</h3>
                    <canvas id="postsActivityChart"></canvas>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-lg font-bold mb-4">Admin Messages Volume</h3>
                    <canvas id="messagesChart"></canvas>
                </div>
                <div class="glass p-6 rounded-3xl md:col-span-2">
                    <h3 class="text-lg font-bold mb-4">User Engagement Overview</h3>
                    <canvas id="engagementChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient('https://gfsqzkyviivhvyqadpeg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdmc3F6a3l2aWl2aHZ5cWFkcGVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0NDI0NDQsImV4cCI6MjA4NjAxODQ0NH0.MwC6dMZKFZMyklCJKqr4DPek8dxR-EswBZSd1L_AkMA', {
            auth: { persistSession: true, storageKey: 'epsilon-admin-auth' }
        });
        lucide.createIcons();

        let currentAdmin = null;
        let chatSubscription = null;

        // Check for existing session on load
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
                currentAdmin = { ...session.user, ...profile };
                document.getElementById('loginPage').classList.remove('active');
                document.getElementById('dashboardPage').classList.add('active');
                loadAnalytics();
            }
        }
        checkSession();

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                document.getElementById('loginError').textContent = error.message;
                document.getElementById('loginError').classList.remove('hidden');
                return;
            }

            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', data.user.id).single();
            currentAdmin = { ...data.user, ...profile };

            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('dashboardPage').classList.add('active');
            loadAnalytics();
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            currentAdmin = null;
            document.getElementById('dashboardPage').classList.remove('active');
            document.getElementById('loginPage').classList.add('active');
        });

        // Navigation
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const page = btn.dataset.page;
                document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
                document.getElementById(`${page}Section`).classList.remove('hidden');

                if (page === 'chat') loadChat();
                if (page === 'projects') loadProjects();
                if (page === 'users') loadUsers();
                if (page === 'analytics') loadAnalytics();
                if (page === 'charts') loadCharts();
                if (page === 'servers') loadBlockedSites();
            });
        });

        // Chat
        async function loadChat() {
            const { data: messages } = await supabaseClient.from('admin_messages').select('*, profiles:sender_id(username, profile_pic)').order('created_at', { ascending: true });
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';

            messages?.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'flex items-start gap-3 glass p-3 rounded-lg';
                div.innerHTML = `
                    <img src="${msg.profiles.profile_pic || 'https://picsum.photos/200'}" class="w-10 h-10 rounded-full">
                    <div class="flex-1">
                        <p class="font-bold text-sm">${msg.profiles.username}</p>
                        <p class="text-purple-200">${msg.content}</p>
                        <p class="text-xs text-purple-400">${new Date(msg.created_at).toLocaleTimeString()}</p>
                    </div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
            subscribeToChat();
        }

        function subscribeToChat() {
            if (chatSubscription) chatSubscription.unsubscribe();
            chatSubscription = supabaseClient.channel('admin_messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'admin_messages' }, () => loadChat()).subscribe();
        }

        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = document.getElementById('chatInput').value.trim();
            if (!content) return;

            await supabaseClient.from('admin_messages').insert([{ sender_id: currentAdmin.id, content }]);
            document.getElementById('chatInput').value = '';
        });

        // Projects
        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await supabaseClient.from('admin_projects').insert([{
                name: document.getElementById('projectName').value,
                description: document.getElementById('projectDesc').value,
                status: document.getElementById('projectStatus').value,
                created_by: currentAdmin.id
            }]);
            e.target.reset();
            loadProjects();
        });

        async function loadProjects() {
            const { data: projects } = await supabaseClient.from('admin_projects').select('*, profiles:created_by(username)').order('created_at', { ascending: false });
            const container = document.getElementById('projectsList');
            container.innerHTML = '';

            projects?.forEach(project => {
                const div = document.createElement('div');
                div.className = 'glass p-6 rounded-3xl';
                div.innerHTML = `
                    <h3 class="text-xl font-bold mb-2">${project.name}</h3>
                    <p class="text-purple-200 mb-3">${project.description}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-xs px-3 py-1 bg-purple-900 rounded-full">${project.status}</span>
                        <span class="text-xs text-purple-400">by @${project.profiles.username}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Users
        async function loadUsers() {
            const { data: users } = await supabaseClient.from('profiles').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('usersList');
            container.innerHTML = '';

            users?.forEach(user => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between glass p-4 rounded-lg';
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="${user.profile_pic || 'https://picsum.photos/200'}" class="w-12 h-12 rounded-full">
                        <div>
                            <p class="font-bold">${user.display_name || user.username}</p>
                            <p class="text-xs text-purple-400">@${user.username}</p>
                        </div>
                    </div>
                    <span class="text-xs text-purple-400">${new Date(user.created_at).toLocaleDateString()}</span>
                `;
                container.appendChild(div);
            });
        }

        // Analytics
        async function loadAnalytics() {
            const { count: usersCount } = await supabaseClient.from('profiles').select('*', { count: 'exact', head: true });
            const { count: postsCount } = await supabaseClient.from('posts').select('*', { count: 'exact', head: true });
            const { count: projectsCount } = await supabaseClient.from('admin_projects').select('*', { count: 'exact', head: true }).eq('status', 'in-progress');

            document.getElementById('totalUsers').textContent = usersCount || 0;
            document.getElementById('totalPosts').textContent = postsCount || 0;
            document.getElementById('activeProjects').textContent = projectsCount || 0;
        }

        // Charts
        let charts = {};
        async function loadCharts() {
            Object.values(charts).forEach(chart => chart.destroy());
            charts = {};

            const chartConfig = { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#f3e8ff' } } }, scales: { y: { ticks: { color: '#f3e8ff' }, grid: { color: 'rgba(168, 85, 247, 0.1)' } }, x: { ticks: { color: '#f3e8ff' }, grid: { color: 'rgba(168, 85, 247, 0.1)' } } } };

            // User Growth Chart
            const { data: users } = await supabaseClient.from('profiles').select('created_at').order('created_at', { ascending: true });
            const last7Days = [...Array(7)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - 6 + i); return d.toISOString().split('T')[0]; });
            const userCounts = last7Days.map(date => users?.filter(u => u.created_at.startsWith(date)).length || 0);
            charts.userGrowth = new Chart(document.getElementById('userGrowthChart'), {
                type: 'line',
                data: { labels: last7Days.map(d => new Date(d).toLocaleDateString('en', { month: 'short', day: 'numeric' })), datasets: [{ label: 'New Users', data: userCounts, borderColor: '#a855f7', backgroundColor: 'rgba(168, 85, 247, 0.1)', tension: 0.4 }] },
                options: chartConfig
            });

            // Project Status Chart
            const { data: projects } = await supabaseClient.from('admin_projects').select('status');
            const statusCounts = { planning: 0, 'in-progress': 0, completed: 0 };
            projects?.forEach(p => statusCounts[p.status]++);
            charts.projectStatus = new Chart(document.getElementById('projectStatusChart'), {
                type: 'doughnut',
                data: { labels: ['Planning', 'In Progress', 'Completed'], datasets: [{ data: Object.values(statusCounts), backgroundColor: ['#8b5cf6', '#a855f7', '#c084fc'] }] },
                options: { responsive: true, plugins: { legend: { labels: { color: '#f3e8ff' } } } }
            });

            // Posts Activity Chart
            const { data: posts } = await supabaseClient.from('posts').select('created_at');
            const postCounts = last7Days.map(date => posts?.filter(p => p.created_at.startsWith(date)).length || 0);
            charts.postsActivity = new Chart(document.getElementById('postsActivityChart'), {
                type: 'bar',
                data: { labels: last7Days.map(d => new Date(d).toLocaleDateString('en', { month: 'short', day: 'numeric' })), datasets: [{ label: 'Posts', data: postCounts, backgroundColor: '#a855f7' }] },
                options: chartConfig
            });

            // Messages Chart
            const { data: messages } = await supabaseClient.from('admin_messages').select('created_at');
            const msgCounts = last7Days.map(date => messages?.filter(m => m.created_at.startsWith(date)).length || 0);
            charts.messages = new Chart(document.getElementById('messagesChart'), {
                type: 'line',
                data: { labels: last7Days.map(d => new Date(d).toLocaleDateString('en', { month: 'short', day: 'numeric' })), datasets: [{ label: 'Messages', data: msgCounts, borderColor: '#c084fc', backgroundColor: 'rgba(192, 132, 252, 0.1)', fill: true }] },
                options: chartConfig
            });

            // Engagement Chart
            const { count: likesCount } = await supabaseClient.from('likes').select('*', { count: 'exact', head: true });
            const { count: commentsCount } = await supabaseClient.from('comments').select('*', { count: 'exact', head: true });
            charts.engagement = new Chart(document.getElementById('engagementChart'), {
                type: 'bar',
                data: { labels: ['Users', 'Posts', 'Likes', 'Comments', 'Projects'], datasets: [{ label: 'Total Count', data: [users?.length || 0, posts?.length || 0, likesCount || 0, commentsCount || 0, projects?.length || 0], backgroundColor: ['#8b5cf6', '#a855f7', '#c084fc', '#d8b4fe', '#e9d5ff'] }] },
                options: { ...chartConfig, indexAxis: 'y' }
            });
        }

        // Server Blocking
        async function loadBlockedSites() {
            const { data: blocked } = await supabaseClient.from('blocked_sites').select('site_name');
            const blockedNames = blocked?.map(b => b.site_name) || [];

            ['aproxi', 'neote', 'edits', 'academics', 'sports', 'earth', 'heckle'].forEach(site => {
                const btn = document.querySelector(`[data-site="${site}"]`);
                const status = document.getElementById(`status-${site}`);
                if (blockedNames.includes(site)) {
                    btn.classList.add('bg-red-600');
                    status.textContent = 'BLOCKED';
                    status.classList.add('text-red-400');
                } else {
                    btn.classList.remove('bg-red-600');
                    status.textContent = 'Active';
                    status.classList.remove('text-red-400');
                }
            });
        }

        async function toggleSiteBlock(siteName) {
            const { data: existing } = await supabaseClient.from('blocked_sites').select('*').eq('site_name', siteName).single();

            if (existing) {
                await supabaseClient.from('blocked_sites').delete().eq('site_name', siteName);
            } else {
                await supabaseClient.from('blocked_sites').insert([{ site_name: siteName, blocked_by: currentAdmin.id }]);
            }

            loadBlockedSites();
        }
        function blockAllSites() {
            ['aproxi', 'neote', 'edits', 'academics', 'sports', 'earth', 'heckle'].forEach(site => toggleSiteBlock(site));
        }
    </script>
</body>

</html>
